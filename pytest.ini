[pytest]
# Pytest configuration for CIFAR-10 Human Disagreement Predictor

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum Python version
minversion = 7.0

# Add current directory to Python path
pythonpath = .

# Output options
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Strict markers (fail on unknown markers)
    --strict-markers
    # Show warnings
    -W default
    # Coverage options (uncomment to enable)
    # --cov=src
    # --cov-report=html
    # --cov-report=term-missing

# Markers for organizing tests
markers =
    property: Property-based tests using Hypothesis
    unit: Unit tests for individual components
    integration: Integration tests for complete workflows
    slow: Tests that take significant time to run
    data_pipeline: Tests for data loading and preprocessing
    model: Tests for model architecture
    loss: Tests for loss functions
    training: Tests for training protocol
    evaluation: Tests for evaluation metrics
    robustness: Tests for robustness and corruption
    explainability: Tests for visualization and explainability

# Hypothesis settings
# These are overridden in conftest.py for different profiles

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    # Ignore specific warnings from dependencies
    ignore::DeprecationWarning:torch.*
    ignore::UserWarning:torchvision.*
    # Treat other warnings as errors (uncomment for strict mode)
    # error

# Timeout for tests (in seconds)
# Uncomment to enable test timeouts
# timeout = 300
# timeout_method = thread
